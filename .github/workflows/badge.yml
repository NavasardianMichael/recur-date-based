name: badge
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: npm ci
      - run: npm run build
      - name: Generate badge
        id: badge
        run: |
          OUTPUT=$(npm run size 2>&1)
          SIZE_NUM=$(echo "$OUTPUT" | grep "Size:" | tail -1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          SIZE="${SIZE_NUM} kB"
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Parsed size: $SIZE"
      - name: Create badge.json
        run: |
          SIZE="${{ steps.badge.outputs.size }}"
          printf '%s\n' '{"schemaVersion":1,"label":"bundle (brotli)","message":"'"$SIZE"'","color":"blue"}' > badge.json
          cat badge.json
      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badge.json
          if git diff --staged --quiet; then
            echo "No changes to badge"
          else
            git commit -m "chore: update bundle size badge [skip ci]"
            git push
          fi

name: CI
on: [push]
jobs:
  build:
    name: Build on Node ${{ matrix.node }} and ${{ matrix.os }}

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: ['18.18', '20', '22', 'lts/*']
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          check-latest: ${{ matrix.node == 'lts/*' }}

      - name: Install deps and build (with cache)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  badge:
    name: Update bundle size badge
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: npm ci
      - run: npm run build
      - name: Generate badge
        id: badge
        run: |
          OUTPUT=$(npm run size 2>&1)
          SIZE_NUM=$(echo "$OUTPUT" | grep "Size:" | tail -1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          SIZE="${SIZE_NUM} kB"
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Parsed size: $SIZE"
      - name: Create badge.json
        run: |
          SIZE="${{ steps.badge.outputs.size }}"
          printf '%s\n' '{"schemaVersion":1,"label":"bundle (brotli)","message":"'"$SIZE"'","color":"blue"}' > badge.json
          cat badge.json
      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badge.json
          if git diff --staged --quiet; then
            echo "No changes to badge"
          else
            git commit --no-verify -m "chore: update bundle size badge [skip ci]"
            git push
          fi
